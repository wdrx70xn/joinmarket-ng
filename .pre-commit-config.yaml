default_language_version:
  python: python3.14

repos:
  - repo: local
    hooks:
      - id: validate-commit-message
        name: validate commit message
        entry: python scripts/validate_commit_message.py
        language: system
        stages: [commit-msg]
        pass_filenames: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.5.0, pydantic-settings>=2.1.0]
        args: [--ignore-missing-imports, --explicit-package-bases, --check-untyped-defs]
