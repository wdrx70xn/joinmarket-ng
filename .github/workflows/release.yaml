name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io

jobs:
  # Run required checks before creating release
  pre-commit:
    permissions:
      contents: read
    uses: ./.github/workflows/pre-commit.yaml

  ci:
    uses: ./.github/workflows/ci.yaml
    permissions:
      contents: read
      packages: write

  create-release:
    needs: [pre-commit, ci]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --always)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Extract release notes from CHANGELOG
        id: extract_notes
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          # Extract notes for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Get content between version header and next version or end
            NOTES=$(awk "/## \[${VERSION}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md)
            if [ -z "$NOTES" ]; then
              NOTES="Release ${VERSION}"$'\n\n'"See [CHANGELOG.md](CHANGELOG.md) for details."
            fi
          else
            NOTES="Release ${VERSION}"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.get_version.outputs.version }} \
            --title "${{ steps.get_version.outputs.version }}" \
            --notes-file - <<'EOF'
          ${{ steps.extract_notes.outputs.notes }}
          EOF

  publish-flatpak:
    needs: create-release
    permissions:
      contents: write
    uses: ./.github/workflows/flatpak.yaml
    with:
      version: ${{ needs.create-release.outputs.version }}
      upload_to_release: true

  publish-docker:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: directory-server
            dockerfile: ./directory_server/Dockerfile
            image: directory-server
            target: production
          - name: directory-server-debug
            dockerfile: ./directory_server/Dockerfile
            image: directory-server-debug
            target: debug
          - name: orderbook-watcher
            dockerfile: ./orderbook_watcher/Dockerfile
            image: orderbook-watcher
          - name: maker
            dockerfile: ./maker/Dockerfile
            image: maker
          - name: taker
            dockerfile: ./taker/Dockerfile
            image: taker
          - name: jam-ng
            dockerfile: ./jmwalletd/Dockerfile
            image: jam-ng
            target: "jam-ng"
          - name: jmwalletd
            dockerfile: ./jmwalletd/Dockerfile
            image: jmwalletd
            target: "jmwalletd"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get Git commit timestamp for reproducible builds
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          flavor: |
            suffix=${{ matrix.tag_suffix || '' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use outputs with rewrite-timestamp for reproducible builds
          # rewrite-timestamp clamps all file timestamps inside the image to SOURCE_DATE_EPOCH
          # This ensures files created by apt-get, pip, etc. have consistent timestamps
          outputs: type=registry,rewrite-timestamp=true
          # Disable attestations for reproducible builds
          # Provenance and SBOM attestations include timestamps and environment data
          # that make builds non-reproducible across different build environments
          provenance: false
          sbom: false
          # Disable cache for reproducible builds
          # Cached layers from previous builds may have different package versions,
          # making local reproduction impossible. Fresh builds ensure consistency.
          no-cache: true
          build-args: |
            VERSION=${{ needs.create-release.outputs.version }}
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

      - name: Export per-platform layer digests for reproducibility
        run: |
          mkdir -p /tmp/digests
          VERSION=${{ needs.create-release.outputs.version }}
          IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${VERSION}

          # Store registry manifest list digest for reference
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.image }}${{ matrix.tag_suffix || '' }}-manifest.txt

          # Extract per-platform layer digests from the pushed image
          # Layer digests are content-addressable and identical regardless of manifest format
          # This enables reproducibility verification by comparing layer content
          for platform in linux/amd64 linux/arm64 linux/arm/v7; do
            arch=$(echo "$platform" | sed 's|linux/||; s|/|-|')

            echo "Extracting layer digests for $platform..."

            # Get the platform-specific manifest and extract layer digests
            layers=$(docker buildx imagetools inspect "$IMAGE" --raw | \
              jq -r --arg os "linux" --arg arch "${arch%-*}" --arg variant "${arch#*-}" \
                '.manifests[] | select(.platform.os == $os and .platform.architecture == $arch and (.platform.variant // "") == (if $variant == $arch then "" else $variant end)) | .digest' | \
              head -1 | \
              xargs -I{} docker buildx imagetools inspect "${IMAGE}@{}" --raw | \
              jq -r '.layers[].digest' | sort)

            # Store as newline-separated list of layer digests
            echo "$layers" > /tmp/digests/${{ matrix.image }}${{ matrix.tag_suffix || '' }}-${arch}-layers.txt
            echo "  $arch layers:"
            echo "$layers" | sed 's/^/    /'
          done

          echo "Extracted layer digests for all platforms"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.image }}${{ matrix.tag_suffix || '' }}
          path: /tmp/digests/
          retention-days: 1

  # ==========================================================================
  # Generate release manifest with image digests for reproducible verification
  # ==========================================================================
  generate-manifest:
    needs: [create-release, publish-docker]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all digest artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Generate release manifest
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          COMMIT_SHA=${{ github.sha }}
          SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)
          BUILD_DATE=$(date -u -d @$SOURCE_DATE_EPOCH +"%Y-%m-%dT%H:%M:%SZ")

          # Create manifest file
          cat > release-manifest-${VERSION}.txt << EOF
          # JoinMarket NG Release Manifest
          # Version: ${VERSION}
          # Commit: ${COMMIT_SHA}
          # Build Date: ${BUILD_DATE}
          # SOURCE_DATE_EPOCH: ${SOURCE_DATE_EPOCH}
          #
          # This manifest contains layer digests for reproducible build verification.
          # Layer digests are content-addressable hashes of the actual image layers,
          # which are identical regardless of manifest format (Docker vs OCI).
          #
          # Verification instructions: see technical/development docs

          ## Git Commit
          commit: ${COMMIT_SHA}
          source_date_epoch: ${SOURCE_DATE_EPOCH}

          ## Docker Images
          EOF

          # Add manifest digests first
          for digest_file in /tmp/digests/*-manifest.txt; do
            if [ -f "$digest_file" ]; then
              image_name=$(basename "$digest_file" .txt)
              digest=$(cat "$digest_file")
              echo "${image_name}: ${digest}" >> release-manifest-${VERSION}.txt
            fi
          done

          echo "" >> release-manifest-${VERSION}.txt
          echo "## Per-Platform Layer Digests (for reproducibility verification)" >> release-manifest-${VERSION}.txt

          # Add layer digests per platform
          for digest_file in /tmp/digests/*-layers.txt; do
            if [ -f "$digest_file" ]; then
              image_name=$(basename "$digest_file" .txt)
              echo "" >> release-manifest-${VERSION}.txt
              echo "### ${image_name}" >> release-manifest-${VERSION}.txt
              cat "$digest_file" >> release-manifest-${VERSION}.txt
            fi
          done

          cat release-manifest-${VERSION}.txt

      - name: Upload manifest to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          gh release upload ${VERSION} release-manifest-${VERSION}.txt --clobber

      # If a signer used the local-first workflow (build-release.sh + sign-release.sh)
      # before pushing the tag, their local manifest is committed alongside their
      # signature. This step verifies that the signer's layer digests (for their
      # architecture) match CI's independently-built layer digests.
      - name: Verify against pre-signed local manifests
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          SIG_DIR="signatures/${VERSION}"

          # Look for local manifests committed by signers
          shopt -s nullglob
          local_manifests=("$SIG_DIR"/*-manifest.txt)
          shopt -u nullglob

          if [ ${#local_manifests[@]} -eq 0 ]; then
            echo "No pre-signed local manifests found for $VERSION"
            echo "This is normal for CI-first releases (signers will sign after CI)"
            exit 0
          fi

          echo "Found ${#local_manifests[@]} pre-signed local manifest(s)"
          echo "Verifying layer digests match CI builds..."
          echo ""

          ERRORS=0

          for local_manifest in "${local_manifests[@]}"; do
            signer=$(basename "$local_manifest" -manifest.txt)
            echo "=== Checking manifest from signer: $signer ==="

            # Extract layer digest sections from local manifest and compare
            # with CI-generated manifest
            while IFS= read -r section; do
              # Get expected layers from local manifest for this section
              local_layers=$(sed -n "/^### ${section}\$/,/^###/{/^sha256:/p}" "$local_manifest" | sort)

              if [ -z "$local_layers" ]; then
                continue
              fi

              # Get CI layers for the same section
              ci_layers=$(sed -n "/^### ${section}\$/,/^###/{/^sha256:/p}" "release-manifest-${VERSION}.txt" | sort)

              if [ -z "$ci_layers" ]; then
                echo "  $section: not present in CI manifest (signer built on different arch)"
                continue
              fi

              if [ "$local_layers" = "$ci_layers" ]; then
                layer_count=$(echo "$local_layers" | wc -l)
                echo "  $section: MATCH ($layer_count layers)"
              else
                echo "::error::$section: MISMATCH between signer and CI layer digests!"
                echo "  Signer layers:"
                echo "$local_layers" | sed 's/^/    /'
                echo "  CI layers:"
                echo "$ci_layers" | sed 's/^/    /'
                ERRORS=$((ERRORS + 1))
              fi
            done < <(grep '^### ' "$local_manifest" | sed 's/^### //')

            echo ""
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::Layer digest mismatches found! The release may not be reproducible."
            echo "This means CI produced different Docker image layers than the signer."
            echo "Investigate before distributing this release."
            exit 1
          fi

          echo "All pre-signed layer digests match CI builds!"
          echo "The release is independently verified as reproducible."
