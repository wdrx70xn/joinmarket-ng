name: CI

on:
  push:
    branches:
      - main
  pull_request_target:
    # pull_request_target runs from the base branch context and has write permissions,
    # which allows pushing to GHCR even for fork PRs.
    # GitHub's built-in "Fork pull request workflows" approval setting gates external
    # contributors (first-time contributors require maintainer approval before running).
    # Organization members can run CI without approval.
    # The workflow files themselves always run from the base branch (not the fork), so
    # malicious workflow changes in a fork PR cannot affect the privileged execution.
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Unique tag for this CI run - used to pass images between jobs
  CI_TAG: ci-${{ github.sha }}

jobs:
  # ==========================================================================
  # Stage 1: Build all Docker images (parallel matrix)
  # Push to GHCR with CI-specific tag for reuse by integration tests
  # ==========================================================================
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: directory-server
            dockerfile: ./directory_server/Dockerfile
            image: directory-server
            target: production
            tag_suffix: ""
          - name: directory-server-debug
            dockerfile: ./directory_server/Dockerfile
            image: directory-server-debug
            target: debug
            tag_suffix: ""
          - name: orderbook-watcher
            dockerfile: ./orderbook_watcher/Dockerfile
            image: orderbook-watcher
            target: ""
            tag_suffix: ""
          - name: maker
            dockerfile: ./maker/Dockerfile
            image: maker
            target: ""
            tag_suffix: ""
          - name: taker
            dockerfile: ./taker/Dockerfile
            image: taker
            target: ""
            tag_suffix: ""
          - name: jam-ng
            dockerfile: ./jmwalletd/Dockerfile
            image: jam-ng
            target: "jam-ng"
            tag_suffix: ""
          - name: jmwalletd
            dockerfile: ./jmwalletd/Dockerfile
            image: jmwalletd
            target: "jmwalletd"
            tag_suffix: ""

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Get Git commit timestamp for reproducible builds
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target || '' }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{ env.CI_TAG }}${{ matrix.tag_suffix }}
          cache-from: |
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:buildcache
            type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:latest
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}
        env:
          SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}

  # ==========================================================================
  # Stage 2a: Unit tests (parallel matrix across Python versions)
  # Runs in parallel with image builds for faster feedback
  # Excludes tests marked with @pytest.mark.docker (those run in integration tests)
  # ==========================================================================
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-python-deps
        with:
          python-version: ${{ matrix.python-version }}
          components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd
          install-dev: 'true'

      - name: Run unit tests
        run: |
          pytest -c pytest.ini jmcore jmwallet directory_server orderbook_watcher maker taker jmwalletd \
            --junitxml=junit/unit-tests.xml \
            --cov=jmcore --cov=jmwallet --cov=directory_server --cov=orderbook_watcher --cov=maker --cov=taker --cov=jmwalletd \
            --cov-report=term-missing --cov-report=xml --cov-report=html \
            -v --fail-on-skip

      - name: Rename coverage file
        if: always()
        run: mv coverage.xml coverage-unit-py${{ matrix.python-version }}.xml

      - uses: actions/upload-artifact@v7
        with:
          name: unit-test-results-py${{ matrix.python-version }}
          path: |
            junit/unit-tests.xml
            coverage-unit-py${{ matrix.python-version }}.xml
            htmlcov/
        if: always()

  # ==========================================================================
  # Stage 3: Integration tests (require Docker infrastructure)
  # Uses pre-built images from build-images where needed
  # Also runs docker-marked tests from jmwallet and maker
  # ==========================================================================
  test-e2e:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      # Use pre-built images from CI
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-${{ github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-${{ github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-${{ github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-${{ github.sha }}
      JMWALLETD_IMAGE: ghcr.io/${{ github.repository }}/jmwalletd:ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd
          install-dev: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $DIRECTORY_SERVER_IMAGE
          docker pull $ORDERBOOK_WATCHER_IMAGE
          docker pull $MAKER_IMAGE
          docker pull $TAKER_IMAGE
          docker pull $JMWALLETD_IMAGE

      - name: "Start e2e services"
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          # Start with pre-built images (env vars override build)
          docker compose --profile e2e up -d

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

          .github/scripts/wait-for-service.sh "Directory Server" \
            "nc -z localhost 5222" \
            30 1

          .github/scripts/wait-for-service.sh "jmwalletd" \
            "curl -sf http://127.0.0.1:28183/api/v1/getinfo" \
            60 2

          echo "Waiting for makers to connect..."
          sleep 20

          echo "E2E services ready!"

      - name: Run e2e tests (our implementation only)
        env:
          BITCOIN_RPC_URL: http://127.0.0.1:18443
          BITCOIN_RPC_USER: test
          BITCOIN_RPC_PASSWORD: test
        run: |
          pytest -c pytest.ini -m e2e --junitxml=junit/test-results.xml \
            --cov --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=300 --reruns=1 --reruns-delay=10 --fail-on-skip

      - name: Show logs
        if: always()
        run: |
          echo "=== Docker compose status ==="
          docker compose --profile e2e ps
          echo ""
          echo "=== Bitcoin logs ==="
          docker compose logs bitcoin --tail=30
          echo ""
          echo "=== Directory logs ==="
          docker compose logs directory --tail=30
          echo ""
          echo "=== Maker1 logs ==="
          docker compose logs maker1 --tail=50
          echo ""
          echo "=== Maker2 logs ==="
          docker compose logs maker2 --tail=50
          echo ""
          echo "=== jmwalletd logs ==="
          docker compose logs jmwalletd --tail=50

      - name: Cleanup
        if: always()
        run: docker compose --profile e2e down -v

      - uses: actions/upload-artifact@v7
        with:
          name: e2e-results
          path: |
            junit/test-results.xml
            coverage.xml
        if: always()

  test-playwright:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-${{ github.sha }}
      JAM_NG_IMAGE: ghcr.io/${{ github.repository }}/jam-ng:ci-${{ github.sha }}
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-${{ github.sha }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install Playwright dependencies
        working-directory: tests/playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $MAKER_IMAGE &
          docker pull $JAM_NG_IMAGE &
          docker pull $DIRECTORY_SERVER_IMAGE &
          wait

      - name: Start e2e services
        run: |
          docker compose --profile e2e up -d

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

          .github/scripts/wait-for-service.sh "Directory Server" \
            "nc -z localhost 5222" \
            30 1

          .github/scripts/wait-for-service.sh "jam-playwright" \
            "curl -sf http://127.0.0.1:29183/api/v1/session" \
            90 2

          echo "E2E services ready!"

      - name: Run Playwright tests
        working-directory: tests/playwright
        env:
          CI: "true"
          JAM_URL: http://localhost:29183
          JMWALLETD_URL: http://localhost:29183
        run: npx playwright test

      - name: Show Docker logs on failure
        if: failure()
        run: |
          docker compose --profile e2e ps
          docker compose --profile e2e logs --tail=200

      - name: Cleanup Docker services
        if: always()
        run: docker compose --profile e2e down -v

      - name: Upload Playwright report and videos
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            tests/playwright/playwright-report/
            tests/playwright/test-results/
          retention-days: 14
        if: always()

  test-jmwallet:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,jmwallet
          install-dev: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built directory-server image
        run: docker pull $DIRECTORY_SERVER_IMAGE

      - name: Start Bitcoin Core for jmwallet tests
        run: |
          docker compose up -d bitcoin

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

      - name: Run jmwallet docker-marked tests only
        env:
          BITCOIN_RPC_URL: http://127.0.0.1:18443
          BITCOIN_RPC_USER: test
          BITCOIN_RPC_PASSWORD: test
        run: |
          pytest -c pytest.ini -m "docker and not neutrino" jmwallet/tests/ \
            --junitxml=junit/jmwallet-docker-tests.xml \
            --cov=jmwallet --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=300 --fail-on-skip

      - name: Show logs
        if: always()
        run: |
          echo "=== Bitcoin logs ==="
          docker compose logs bitcoin --tail=50

      - name: Cleanup
        if: always()
        run: docker compose down -v

      - uses: actions/upload-artifact@v7
        with:
          name: jmwallet-docker-results
          path: |
            junit/jmwallet-docker-tests.xml
            coverage.xml
        if: always()

  test-maker:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,jmwallet,maker
          install-dev: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built directory-server image
        run: docker pull $DIRECTORY_SERVER_IMAGE

      - name: Start Bitcoin Core for maker tests
        run: |
          docker compose up -d bitcoin

          .github/scripts/wait-for-service.sh "Bitcoin" \
            "docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo" \
            60 1

      - name: Run maker docker-marked tests only
        env:
          BITCOIN_RPC_URL: http://127.0.0.1:18443
          BITCOIN_RPC_USER: test
          BITCOIN_RPC_PASSWORD: test
        run: |
          pytest -c pytest.ini -m docker maker/tests/ \
            --junitxml=junit/maker-docker-tests.xml \
            --cov=maker --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=300 --fail-on-skip

      - name: Show logs
        if: always()
        run: |
          echo "=== Bitcoin logs ==="
          docker compose logs bitcoin --tail=50

      - name: Cleanup
        if: always()
        run: docker compose down -v

      - uses: actions/upload-artifact@v7
        with:
          name: maker-docker-results
          path: |
            junit/maker-docker-tests.xml
            coverage.xml
        if: always()

  test-directory-server-docker:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,directory_server
          install-dev: 'true'

      - name: Run directory-server docker-marked tests
        run: |
          pytest -c pytest.ini -m docker directory_server/tests/ \
            --junitxml=junit/directory-server-docker-tests.xml \
            --cov=directory_server --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=300 --fail-on-skip

      - uses: actions/upload-artifact@v7
        with:
          name: directory-server-docker-results
          path: |
            junit/directory-server-docker-tests.xml
            coverage.xml
        if: always()

  test-reference-interop:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-${{ github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-${{ github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-${{ github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: ./.github/actions/setup-python-deps
        with:
          components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker
          install-dev: 'true'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built images
        run: |
          docker pull $DIRECTORY_SERVER_IMAGE
          docker pull $ORDERBOOK_WATCHER_IMAGE
          docker pull $MAKER_IMAGE
          docker pull $TAKER_IMAGE

      - name: Clone and install reference implementation
        run: |
          git clone --depth 1 https://github.com/JoinMarket-Org/joinmarket-clientserver.git
          sudo apt-get update && sudo apt-get install -y libsecp256k1-dev
          pip install \
            chromalog==1.0.5 \
            service-identity==21.1.0 \
            twisted==24.7.0 \
            txtorcon==23.11.0 \
            python-bitcointx==1.1.5 \
            argon2_cffi==21.3.0 \
            autobahn==20.12.3 \
            fastbencode==0.3.6 \
            mnemonic==0.20 \
            pyjwt==2.4.0 \
            klein \
            werkzeug

      - name: "Start reference services"
        env:
          TOR_HS_ED25519_SECRET_KEY_BASE64: ${{ secrets.TOR_HS_ED25519_SECRET_KEY_BASE64 }}
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
        run: |
          docker compose --profile reference up -d

          echo "Waiting for Bitcoin..."
          for i in {1..60}; do
            if docker compose exec -T bitcoin bitcoin-cli -chain=regtest \
                -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo 2>/dev/null; then
              echo "Bitcoin ready"
              break
            fi
            echo "Attempt $i/60..."
            sleep 2
          done

          echo "Waiting for directory server..."
          for i in {1..30}; do
            if nc -z localhost 5222 2>/dev/null; then
              echo "Directory server ready"
              break
            fi
            sleep 2
          done

          echo "Waiting for Tor hidden service..."
          for i in {1..90}; do
            if docker compose exec -T tor cat /var/lib/tor/directory/hostname 2>/dev/null | grep -q ".onion"; then
              ONION=$(docker compose exec -T tor cat /var/lib/tor/directory/hostname 2>/dev/null | tr -d '[:space:]')
              echo "Tor ready with onion address: $ONION"
              break
            fi
            echo "Attempt $i/90: Waiting for Tor..."
            sleep 2
          done

          echo "Waiting for JAM..."
          for i in {1..30}; do
            if docker compose exec -T jam sh -c "timeout 5 bash -c '</dev/tcp/127.0.0.1/80'" 2>/dev/null; then
              echo "JAM ready"
              break
            fi
            sleep 5
          done

          echo "Waiting for makers to connect..."
          sleep 30

          echo "Reference services ready!"

      - name: Run reference compatibility tests
        env:
          BITCOIN_RPC_URL: http://127.0.0.1:18443
          BITCOIN_RPC_USER: test
          BITCOIN_RPC_PASSWORD: test
        run: |
          pytest -c pytest.ini -m reference tests/e2e/test_our_maker_reference_taker.py \
            --junitxml=junit/test-results.xml \
            --cov --cov-report=term-missing --cov-report=xml \
            -v -s --timeout=300 --reruns=1 --reruns-delay=10 --fail-on-skip

      - name: Show logs
        if: always()
        run: |
          echo "=== Docker compose status ==="
          docker compose --profile reference ps
          echo ""
          echo "=== Bitcoin logs ==="
          docker compose logs bitcoin --tail=30
          echo ""
          echo "=== Directory logs ==="
          docker compose logs directory --tail=50
          echo ""
          echo "=== Maker1 logs ==="
          docker compose logs maker1 --tail=50
          echo ""
          echo "=== Maker2 logs ==="
          docker compose logs maker2 --tail=50
          echo ""
          echo "=== Tor logs ==="
          docker compose logs tor --tail=30
          echo ""
          echo "=== JAM logs ==="
          docker compose logs jam --tail=100

      - name: Cleanup
        if: always()
        run: docker compose --profile reference down -v

      - uses: actions/upload-artifact@v7
        with:
          name: reference-interop-results
          path: |
            junit/test-results.xml
            coverage.xml
        if: always()

  test-reference-legacy:
