  test-reference-maker:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name || github.repository
          }}
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false
    - uses: ./.github/actions/setup-python-deps
      with:
        components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker
        install-dev: 'true'
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Pull pre-built images
      run: 'docker pull $DIRECTORY_SERVER_IMAGE

        docker pull $ORDERBOOK_WATCHER_IMAGE

        docker pull $MAKER_IMAGE

        docker pull $TAKER_IMAGE

        '
    - name: Start reference-maker services
      env:
        TOR_HS_ED25519_SECRET_KEY_BASE64: ${{ secrets.TOR_HS_ED25519_SECRET_KEY_BASE64
          }}
        DOCKER_BUILDKIT: 1
        COMPOSE_DOCKER_CLI_BUILD: 1
      run: "docker compose --profile reference-maker up -d\n\necho \"Waiting for Bitcoin...\"\
        \nfor i in {1..60}; do\n  if docker compose exec -T bitcoin-jam bitcoin-cli\
        \ -chain=regtest \\\n      -rpcport=18445 -rpcuser=test -rpcpassword=test\
        \ getblockchaininfo 2>/dev/null; then\n    echo \"Bitcoin ready\"\n    break\n\
        \  fi\n  echo \"Attempt $i/60...\"\n  sleep 2\ndone\n\necho \"Waiting for\
        \ directory server...\"\nfor i in {1..30}; do\n  if nc -z localhost 5222 2>/dev/null;\
        \ then\n    echo \"Directory server ready\"\n    break\n  fi\n  sleep 2\n\
        done\n\necho \"Waiting for Tor hidden service...\"\nfor i in {1..90}; do\n\
        \  if docker compose exec -T tor cat /var/lib/tor/directory/hostname 2>/dev/null\
        \ | grep -q \".onion\"; then\n    ONION=$(docker compose exec -T tor cat /var/lib/tor/directory/hostname\
        \ 2>/dev/null | tr -d '[:space:]')\n    echo \"Tor ready with onion address:\
        \ $ONION\"\n    break\n  fi\n  echo \"Attempt $i/90: Waiting for Tor...\"\n\
        \  sleep 2\ndone\n\necho \"Waiting for JAM makers...\"\nfor i in {1..30};\
        \ do\n  if docker compose exec -T jam-maker1 sh -c \"timeout 5 bash -c '</dev/tcp/127.0.0.1/80'\"\
        \ 2>/dev/null; then\n    echo \"JAM maker1 ready\"\n    break\n  fi\n  sleep\
        \ 5\ndone\n\necho \"Waiting for reference makers to connect...\"\nsleep 30\n\
        \necho \"Reference-maker services ready!\"\n"
    - name: Run reference-maker compatibility tests
      env:
        BITCOIN_RPC_URL: http://127.0.0.1:18445
        BITCOIN_RPC_USER: test
        BITCOIN_RPC_PASSWORD: test
      run: "pytest -c pytest.ini -m reference_maker --junitxml=junit/test-results.xml\
        \ \\\n  --cov --cov-report=term-missing --cov-report=xml \\\n  -v -s --timeout=300\
        \ --reruns=1 --reruns-delay=10 --fail-on-skip\n"
    - name: Show logs
      if: always()
      run: 'echo "=== Docker compose status ==="

        docker compose --profile reference-maker ps

        echo ""

        echo "=== Bitcoin-jam logs ==="

        docker compose logs bitcoin-jam --tail=30

        echo ""

        echo "=== Directory logs ==="

        docker compose logs directory --tail=50

        echo ""

        echo "=== Tor logs ==="

        docker compose logs tor --tail=30

        echo ""

        echo "=== JAM Maker1 logs ==="

        docker compose logs jam-maker1 --tail=100

        echo ""

        echo "=== JAM Maker2 logs ==="

        docker compose logs jam-maker2 --tail=100

        '
    - name: Cleanup
      if: always()
      run: docker compose --profile reference-maker down -v
    - uses: actions/upload-artifact@v7
      with:
        name: reference-maker-results
        path: 'junit/test-results.xml

          coverage.xml

          '
      if: always()
  build-arm64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: directory-server
          dockerfile: ./directory_server/Dockerfile
          image: directory-server
          target: production
          tag_suffix: ''
        - name: directory-server-debug
          dockerfile: ./directory_server/Dockerfile
          image: directory-server-debug
          target: debug
          tag_suffix: ''
        - name: orderbook-watcher
          dockerfile: ./orderbook_watcher/Dockerfile
          image: orderbook-watcher
          target: ''
          tag_suffix: ''
        - name: maker
          dockerfile: ./maker/Dockerfile
          image: maker
          target: ''
          tag_suffix: ''
        - name: taker
          dockerfile: ./taker/Dockerfile
          image: taker
          target: ''
          tag_suffix: ''
        - name: jam-ng
          dockerfile: ./jmwalletd/Dockerfile
          image: jam-ng
          target: jam-ng
          tag_suffix: ''
        - name: jmwalletd
          dockerfile: ./jmwalletd/Dockerfile
          image: jmwalletd
          target: jmwalletd
          tag_suffix: ''
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Get Git commit timestamp for reproducible builds
      run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push ARM64 image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        target: ${{ matrix.target || '' }}
        push: true
        platforms: linux/arm64
        tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{
          github.ref_name }}-${{ github.sha }}${{ matrix.tag_suffix }}-arm64
        cache-from: 'type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{
          matrix.image }}:buildcache-arm64

          type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image
          }}:latest

          '
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{
          matrix.image }}:buildcache-arm64,mode=max
        build-args: 'BUILDKIT_INLINE_CACHE=1

          SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

          JOINMARKET_BUILD_COMMIT=${{ github.sha }}

          JOINMARKET_BUILD_REF=${{ github.ref_name }}

          '
      env:
        SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
