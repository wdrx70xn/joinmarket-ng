    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: directory-server
          image: directory-server
          tag_suffix: ''
        - name: directory-server-debug
          image: directory-server-debug
          tag_suffix: ''
        - name: orderbook-watcher
          image: orderbook-watcher
          tag_suffix: ''
        - name: maker
          image: maker
          tag_suffix: ''
        - name: taker
          image: taker
          tag_suffix: ''
        - name: jam-ng
          image: jam-ng
          tag_suffix: ''
        - name: jmwalletd
          image: jmwalletd
          tag_suffix: ''
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
        flavor: 'suffix=${{ matrix.tag_suffix }}

          '
        tags: 'type=ref,event=branch

          type=ref,event=pr

          type=semver,pattern={{version}}

          type=semver,pattern={{major}}.{{minor}}

          type=sha,prefix={{branch}}-

          type=raw,value=latest,enable=${{ startsWith(github.ref, ''refs/tags/'')
          }}

          '
    - name: Create and push multi-arch manifest
      run: "# Define source images for each architecture\nAMD64_IMAGE=\"${{ env.REGISTRY\
        \ }}/${{ github.repository }}/${{ matrix.image }}:${{ env.CI_TAG }}${{ matrix.tag_suffix\
        \ }}\"\nARM64_IMAGE=\"${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image\
        \ }}:${{ github.ref_name }}-${{ github.sha }}${{ matrix.tag_suffix }}-arm64\"\
        \nARMV7_IMAGE=\"${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image\
        \ }}:${{ github.ref_name }}-${{ github.sha }}${{ matrix.tag_suffix }}-armv7\"\
        \n\necho \"Inspecting source images:\"\ndocker buildx imagetools inspect \"\
        $AMD64_IMAGE\" || echo \"AMD64 image not found\"\ndocker buildx imagetools\
        \ inspect \"$ARM64_IMAGE\" || echo \"ARM64 image not found\"\ndocker buildx\
        \ imagetools inspect \"$ARMV7_IMAGE\" || echo \"ARMv7 image not found\"\n\n\
        # Create multi-arch manifest for each production tag\nTAGS=\"${{ steps.meta.outputs.tags\
        \ }}\"\nfor TAG in $TAGS; do\n  echo \"Creating multi-arch manifest: $TAG\"\
        \n  docker buildx imagetools create \\\n    --tag \"$TAG\" \\\n    \"$AMD64_IMAGE\"\
        \ \\\n    \"$ARM64_IMAGE\" \\\n    \"$ARMV7_IMAGE\"\n\n  echo \"Verifying\
        \ manifest: $TAG\"\n  docker buildx imagetools inspect \"$TAG\"\ndone\n"
