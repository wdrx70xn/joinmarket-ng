        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Pull pre-built images
      run: 'docker pull $DIRECTORY_SERVER_IMAGE

        docker pull $ORDERBOOK_WATCHER_IMAGE

        docker pull $MAKER_IMAGE

        docker pull $TAKER_IMAGE

        docker pull $JMWALLETD_IMAGE

        '
    - name: Start e2e services
      env:
        DOCKER_BUILDKIT: 1
        COMPOSE_DOCKER_CLI_BUILD: 1
      run: "# Start with pre-built images (env vars override build)\ndocker compose\
        \ --profile e2e up -d\n\n.github/scripts/wait-for-service.sh \"Bitcoin\" \\\
        \n  \"docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443\
        \ -rpcuser=test -rpcpassword=test getblockchaininfo\" \\\n  60 1\n\n.github/scripts/wait-for-service.sh\
        \ \"Directory Server\" \\\n  \"nc -z localhost 5222\" \\\n  30 1\n\n.github/scripts/wait-for-service.sh\
        \ \"jmwalletd\" \\\n  \"curl -skf https://127.0.0.1:28183/api/v1/getinfo\"\
        \ \\\n  60 2\n\necho \"Waiting for makers to connect...\"\nsleep 20\n\necho\
        \ \"E2E services ready!\"\n"
    - name: Run tumbler e2e tests
      env:
        BITCOIN_RPC_URL: http://127.0.0.1:18443
        BITCOIN_RPC_USER: test
        BITCOIN_RPC_PASSWORD: test
      run: "pytest -c pytest.ini -m tumbler_e2e --junitxml=junit/test-results.xml\
        \ \\\n  --cov --cov-report=term-missing --cov-report=xml \\\n  -v -s --timeout=600\
        \ --reruns=1 --reruns-delay=10 --fail-on-skip\n"
    - name: Show logs
      if: always()
      run: 'echo "=== Docker compose status ==="

        docker compose --profile e2e ps

        echo ""

        echo "=== Bitcoin logs ==="

        docker compose logs bitcoin --tail=30

        echo ""

        echo "=== Directory logs ==="

        docker compose logs directory --tail=30

        echo ""

        echo "=== Maker1 logs ==="

        docker compose logs maker1 --tail=100

        echo ""

        echo "=== Maker2 logs ==="

        docker compose logs maker2 --tail=100

        echo ""

        echo "=== Maker3 logs ==="

        docker compose logs maker3 --tail=100

        echo ""

        echo "=== Maker4 logs ==="

        docker compose logs maker4 --tail=100

        echo ""

        echo "=== Maker5 logs ==="

        docker compose logs maker5 --tail=100

        echo ""

        echo "=== jmwalletd logs ==="

        docker compose logs jmwalletd --tail=200

        echo ""

        echo "=== orderbook-watcher logs ==="

        docker compose logs orderbook-watcher --tail=100

        '
    - name: Cleanup
      if: always()
      run: docker compose --profile e2e down -v
    - uses: actions/upload-artifact@v7
      with:
        name: tumbler-results
        path: 'junit/test-results.xml

          coverage.xml

          '
      if: always()
  test-playwright:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      JAM_NG_IMAGE: ghcr.io/${{ github.repository }}/jam-ng:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name || github.repository
          }}
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
    - name: Install Playwright dependencies
      working-directory: tests/playwright
      run: 'npm ci

        npx playwright install --with-deps chromium

        '
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Pull pre-built images
      run: 'docker pull $MAKER_IMAGE &

        docker pull $JAM_NG_IMAGE &

        docker pull $DIRECTORY_SERVER_IMAGE &

        wait

        '
    - name: Start e2e services
      run: "docker compose --profile e2e up -d\n\n.github/scripts/wait-for-service.sh\
        \ \"Bitcoin\" \\\n  \"docker compose exec -T bitcoin bitcoin-cli -chain=regtest\
        \ -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo\" \\\n\
        \  60 1\n\n.github/scripts/wait-for-service.sh \"Directory Server\" \\\n \
        \ \"nc -z localhost 5222\" \\\n  30 1\n\n.github/scripts/wait-for-service.sh\
        \ \"jam-playwright\" \\\n  \"curl -skf https://127.0.0.1:29183/api/v1/session\"\
        \ \\\n  90 2\n\n# Wait for at least 4 maker offers to appear in the orderbook\
        \ so\n# that the collaborative-send playwright test (which requires the\n\
        # JAM minimum of 4 collaborators) does not race maker startup.\n.github/scripts/wait-for-service.sh\
        \ \"Orderbook offers (>=4)\" \\\n  \"curl -sf http://127.0.0.1:8080/orderbook.json\
        \ | python3 -c 'import sys,json; sys.exit(0 if len(json.load(sys.stdin).get(\\\
        \"offers\\\", [])) >= 4 else 1)'\" \\\n  120 2\n\necho \"E2E services ready!\"\
        \n"
    - name: Run Playwright tests
      working-directory: tests/playwright
      env:
        CI: 'true'
        JAM_URL: https://localhost:29183
        JMWALLETD_URL: https://localhost:29183
        NODE_TLS_REJECT_UNAUTHORIZED: '0'
      run: npx playwright test
    - name: Show Docker logs on failure
      if: failure()
      run: 'docker compose --profile e2e ps

        docker compose --profile e2e logs --tail=200

        '
    - name: Cleanup Docker services
      if: always()
      run: docker compose --profile e2e down -v
    - name: Upload Playwright report and videos
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: 'tests/playwright/playwright-report/

          tests/playwright/test-results/

          '
        retention-days: 14
      if: always()
  test-jmwallet:
