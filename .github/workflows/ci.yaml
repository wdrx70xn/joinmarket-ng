    - name: Pull pre-built directory-server image
      run: docker pull $DIRECTORY_SERVER_IMAGE
    - name: Start Bitcoin Core for jmwallet tests
      run: "docker compose up -d bitcoin\n\n.github/scripts/wait-for-service.sh \"\
        Bitcoin\" \\\n  \"docker compose exec -T bitcoin bitcoin-cli -chain=regtest\
        \ -rpcport=18443 -rpcuser=test -rpcpassword=test getblockchaininfo\" \\\n\
        \  60 1\n"
    - name: Run jmwallet docker-marked tests only
      env:
        BITCOIN_RPC_URL: http://127.0.0.1:18443
        BITCOIN_RPC_USER: test
        BITCOIN_RPC_PASSWORD: test
      run: "pytest -c pytest.ini -m \"docker and not neutrino\" jmwallet/tests/ \\\
        \n  --junitxml=junit/jmwallet-docker-tests.xml \\\n  --cov=jmwallet --cov-report=term-missing\
        \ --cov-report=xml \\\n  -v -s --timeout=300 --fail-on-skip\n"
    - name: Show logs
      if: always()
      run: 'echo "=== Bitcoin logs ==="

        docker compose logs bitcoin --tail=50

        '
    - name: Cleanup
      if: always()
      run: docker compose down -v
    - uses: actions/upload-artifact@v7
      with:
        name: jmwallet-docker-results
        path: 'junit/jmwallet-docker-tests.xml

          coverage.xml

          '
      if: always()
