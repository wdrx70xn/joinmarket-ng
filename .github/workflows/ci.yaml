name: CI
'on':
  push:
    branches:
    - main
  pull_request_target: null
  workflow_dispatch: null
  workflow_call: null
permissions:
  contents: read
env:
  REGISTRY: ghcr.io
  CI_TAG: ci-unsafe-do-not-run-${{ github.event.pull_request.head.sha || github.sha
    }}
jobs:
  build-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
        - name: directory-server
          dockerfile: ./directory_server/Dockerfile
          image: directory-server
          target: production
          tag_suffix: ''
        - name: directory-server-debug
          dockerfile: ./directory_server/Dockerfile
          image: directory-server-debug
          target: debug
          tag_suffix: ''
        - name: orderbook-watcher
          dockerfile: ./orderbook_watcher/Dockerfile
          image: orderbook-watcher
          target: ''
          tag_suffix: ''
        - name: maker
          dockerfile: ./maker/Dockerfile
          image: maker
          target: ''
          tag_suffix: ''
        - name: taker
          dockerfile: ./taker/Dockerfile
          image: taker
          target: ''
          tag_suffix: ''
        - name: jam-ng
          dockerfile: ./jmwalletd/Dockerfile
          image: jam-ng
          target: jam-ng
          tag_suffix: ''
        - name: jmwalletd
          dockerfile: ./jmwalletd/Dockerfile
          image: jmwalletd
          target: jmwalletd
          tag_suffix: ''
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name || github.repository
          }}
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false
    - name: Get Git commit timestamp for reproducible builds
      run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ${{ matrix.dockerfile }}
        target: ${{ matrix.target || '' }}
        push: true
        tags: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}:${{
          env.CI_TAG }}${{ matrix.tag_suffix }}
        cache-from: 'type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{
          matrix.image }}:buildcache

          type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image
          }}:latest

          '
        cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{
          matrix.image }}:buildcache,mode=max
        build-args: 'BUILDKIT_INLINE_CACHE=1

          SOURCE_DATE_EPOCH=${{ env.SOURCE_DATE_EPOCH }}

          JOINMARKET_BUILD_COMMIT=${{ github.sha }}

          JOINMARKET_BUILD_REF=${{ github.ref_name }}

          '
      env:
        SOURCE_DATE_EPOCH: ${{ env.SOURCE_DATE_EPOCH }}
  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name || github.repository
          }}
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false
    - uses: ./.github/actions/setup-python-deps
      with:
        python-version: ${{ matrix.python-version }}
        components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd,tumbler
        install-dev: 'true'
    - name: Run unit tests
      run: "pytest -c pytest.ini jmcore jmwallet directory_server orderbook_watcher\
        \ maker taker jmwalletd tumbler \\\n  --junitxml=junit/unit-tests.xml \\\n\
        \  --cov=jmcore --cov=jmwallet --cov=directory_server --cov=orderbook_watcher\
        \ --cov=maker --cov=taker --cov=jmwalletd --cov=tumbler \\\n  --cov-report=term-missing\
        \ --cov-report=xml --cov-report=html \\\n  -v --fail-on-skip\n"
    - name: Rename coverage file
      if: always()
      run: mv coverage.xml coverage-unit-py${{ matrix.python-version }}.xml
    - uses: actions/upload-artifact@v7
      with:
        name: unit-test-results-py${{ matrix.python-version }}
        path: 'junit/unit-tests.xml

          coverage-unit-py${{ matrix.python-version }}.xml

          htmlcov/

          '
      if: always()
  test-e2e:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      JMWALLETD_IMAGE: ghcr.io/${{ github.repository }}/jmwalletd:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
    steps:
    - uses: actions/checkout@v6
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name || github.repository
          }}
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        persist-credentials: false
    - uses: ./.github/actions/setup-python-deps
      with:
        components: jmcore,jmwallet,directory_server,orderbook_watcher,maker,taker,jmwalletd,tumbler
        install-dev: 'true'
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Pull pre-built images
      run: 'docker pull $DIRECTORY_SERVER_IMAGE

        docker pull $ORDERBOOK_WATCHER_IMAGE

        docker pull $MAKER_IMAGE

        docker pull $TAKER_IMAGE

        docker pull $JMWALLETD_IMAGE

        '
    - name: Start e2e services
      env:
        DOCKER_BUILDKIT: 1
        COMPOSE_DOCKER_CLI_BUILD: 1
      run: "# Start with pre-built images (env vars override build)\ndocker compose\
        \ --profile e2e up -d\n\n.github/scripts/wait-for-service.sh \"Bitcoin\" \\\
        \n  \"docker compose exec -T bitcoin bitcoin-cli -chain=regtest -rpcport=18443\
        \ -rpcuser=test -rpcpassword=test getblockchaininfo\" \\\n  60 1\n\n.github/scripts/wait-for-service.sh\
        \ \"Directory Server\" \\\n  \"nc -z localhost 5222\" \\\n  30 1\n\n.github/scripts/wait-for-service.sh\
        \ \"jmwalletd\" \\\n  \"curl -skf https://127.0.0.1:28183/api/v1/getinfo\"\
        \ \\\n  60 2\n\necho \"Waiting for makers to connect...\"\nsleep 20\n\necho\
        \ \"E2E services ready!\"\n"
    - name: Run e2e tests (our implementation only)
      env:
        BITCOIN_RPC_URL: http://127.0.0.1:18443
        BITCOIN_RPC_USER: test
        BITCOIN_RPC_PASSWORD: test
      run: "pytest -c pytest.ini -m \"e2e and not tumbler_e2e\" --junitxml=junit/test-results.xml\
        \ \\\n  --cov --cov-report=term-missing --cov-report=xml \\\n  -v -s --timeout=300\
        \ --reruns=1 --reruns-delay=10 --fail-on-skip\n"
    - name: Show logs
      if: always()
      run: 'echo "=== Docker compose status ==="

        docker compose --profile e2e ps

        echo ""

        echo "=== Bitcoin logs ==="

        docker compose logs bitcoin --tail=30

        echo ""

        echo "=== Directory logs ==="

        docker compose logs directory --tail=30

        echo ""

        echo "=== Maker1 logs ==="

        docker compose logs maker1 --tail=50

        echo ""

        echo "=== Maker2 logs ==="

        docker compose logs maker2 --tail=50

        echo ""

        echo "=== jmwalletd logs ==="

        docker compose logs jmwalletd --tail=50

        '
    - name: Cleanup
      if: always()
      run: docker compose --profile e2e down -v
    - uses: actions/upload-artifact@v7
      with:
        name: e2e-results
        path: 'junit/test-results.xml

          coverage.xml

          '
      if: always()
  test-tumbler:
    needs: build-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    env:
      DIRECTORY_SERVER_IMAGE: ghcr.io/${{ github.repository }}/directory-server:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      ORDERBOOK_WATCHER_IMAGE: ghcr.io/${{ github.repository }}/orderbook-watcher:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      MAKER_IMAGE: ghcr.io/${{ github.repository }}/maker:ci-unsafe-do-not-run-${{
        github.event.pull_request.head.sha || github.sha }}
      TAKER_IMAGE: ghcr.io/${{ github.repository }}/taker:ci-unsafe-do-not-run-${{
