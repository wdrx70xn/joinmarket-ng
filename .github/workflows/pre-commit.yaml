name: Prek checks

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  prek:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Validate commit messages
        if: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
        run: |
          resolve_fallback_range() {
            local base_ref="${1:-main}"
            local merge_base=""

            if git show-ref --verify --quiet "refs/remotes/origin/${base_ref}"; then
              merge_base="$(git merge-base "origin/${base_ref}" HEAD)"
            else
              merge_base="$(git rev-parse HEAD~1)"
            fi

            printf "%s..HEAD" "${merge_base}"
          }

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"

            if git cat-file -e "${BASE_SHA}^{commit}" && git cat-file -e "${HEAD_SHA}^{commit}"; then
              RANGE="${BASE_SHA}..${HEAD_SHA}"
            else
              RANGE="$(resolve_fallback_range "${{ github.base_ref }}")"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            BEFORE_SHA="${{ github.event.before }}"

            if [[ "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              RANGE="$(resolve_fallback_range "main")"
            elif git cat-file -e "${BEFORE_SHA}^{commit}" && git merge-base --is-ancestor "${BEFORE_SHA}" "${{ github.sha }}"; then
              RANGE="${BEFORE_SHA}..${{ github.sha }}"
            else
              RANGE="$(resolve_fallback_range "main")"
            fi
          else
            RANGE="HEAD~1..HEAD"
          fi

          echo "Validating commit range: ${RANGE}"
          python scripts/validate_commit_message.py --rev-range "${RANGE}"

      - uses: j178/prek-action@v1
