name: Build and deploy ProperDocs documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: 'requirements-docs.txt'

      - name: Install dependencies
        run: |
          pip install -r requirements-docs.txt
          pip install \
            -e jmcore \
            -e jmwallet \
            -e taker \
            -e maker \
            -e directory_server \
            -e orderbook_watcher \
            -e jmwalletd \
            -e tumbler

      - name: Build documentation
        run: |
          properdocs build -q -f properdocs.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
