services:
  directory_server:
    image: ghcr.io/joinmarket-ng/joinmarket-ng/directory-server:main
    # build:
    #   context: ..
    #   dockerfile: directory_server/Dockerfile
    container_name: joinmarket_directory_server
    environment:
      - NETWORK_CONFIG__NETWORK=mainnet
      - DIRECTORY_SERVER__HOST=0.0.0.0
      - DIRECTORY_SERVER__PORT=5222
      - DIRECTORY_SERVER__MAX_PEERS=10000
      - DIRECTORY_SERVER__HEALTH_CHECK_HOST=0.0.0.0
      - DIRECTORY_SERVER__HEALTH_CHECK_PORT=8080
      - LOGGING__LEVEL=INFO
    networks:
      - joinmarket_directory_internal
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 4G
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  tor:
    image: ghcr.io/m0wer/docker-tor:latest
    container_name: joinmarket_directory_tor
    user: "1000:1000"
    volumes:
      - ./tor/conf:/etc/tor:ro
      - ./tor/data:/var/lib/tor
      - ./tor/run:/var/run/tor
    networks:
      - joinmarket_directory_internal
      - joinmarket_directory_external
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 2 bash -c '</dev/tcp/127.0.0.1/9050' 2>/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: 2
          memory: 300M

networks:
  joinmarket_directory_internal:
    driver: bridge
    internal: true
  joinmarket_directory_external:
    driver: bridge
