[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = taker/src jmcore/src jmwallet/src maker/src directory_server/src orderbook_watcher/src .
addopts = -v --cov --cov-report=html --cov-report=term -m "not docker" --timeout=60
norecursedirs = tests/e2e/reference/tor_keys
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    docker: marks tests requiring any Docker services (auto-excluded by default)
    e2e: marks tests requiring Docker e2e profile (our implementation only)
    reference: marks tests requiring Docker reference profile (JAM compatibility)
    neutrino: marks tests requiring Docker neutrino profile (light client)
    reference_maker: marks tests requiring Docker reference-maker profile
    neutrino_reference: marks tests requiring both Docker neutrino and reference profiles simultaneously
    requires_jmclient: marks tests requiring local joinmarket-clientserver source tree
    flaky: marks tests that may fail due to external dependencies (will be retried)
